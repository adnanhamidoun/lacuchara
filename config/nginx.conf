# ============================================================================
# NGINX Configuration for AZCA Prediction API
# ============================================================================
# Uso: docker-compose --profile production up
# La imagen NGINX se ejecutará en puerto 80/443 y hará proxy a FastAPI en 8000

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=1000r/s;

    # ========================================================================
    # Upstream Backend (FastAPI)
    # ========================================================================
    upstream backend {
        # Health check: max_fails=3, fail_timeout=10s
        server azca-api:8000 max_fails=3 fail_timeout=10s;
        
        # Load balancing
        keepalive 32;
    }

    # ========================================================================
    # HTTP Server (Redirect a HTTPS)
    # ========================================================================
    server {
        listen 80;
        server_name _;

        # Health check para load balancer
        location /health {
            access_log off;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirigir todo a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # HTTPS Server (Production)
    # ========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        # SSL Certificates (cambiar rutas según tu setup)
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # SSL Configuration (HSTS)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (Strict-Transport-Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # CORS handling (si es necesario)
        add_header Access-Control-Allow-Origin "*" always;

        server_name _;

        # ====================================================================
        # Static Assets (Frontend)
        # ====================================================================
        location ~* ^/(index\\.html|manifest\\.json|favicon\\.ico|robots\\.txt)$ {
            root /app/frontend/dist;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /app/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static files (dist/)
        location / {
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # ====================================================================
        # API Proxy (Backend FastAPI)
        # ====================================================================
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # WebSocket (si es necesario para real-time)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            access_log off;
            limit_req zone=general_limit burst=500 nodelay;
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ====================================================================
        # Documentation (Swagger, ReDoc)
        # ====================================================================
        location ~ ^/(docs|openapi\\.json|redoc)/?$ {
            limit_req zone=general_limit burst=100 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ========================================================================
    # Métricas Prometheus (Opcional)
    # ========================================================================
    # server {
    #     listen 9090;
    #     location /metrics {
    #         stub_status;
    #         access_log off;
    #         allow 127.0.0.1;
    #         deny all;
    #     }
    # }
}
