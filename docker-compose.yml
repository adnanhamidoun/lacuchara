version: '3.8'

services:
  # ============================================================================
  # AZCA Prediction API (Backend + Frontend compilado)
  # ============================================================================
  azca-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azca-api
    ports:
      - "8000:8000"
    environment:
      # Credenciales de BD (IMPORTANTE: Usar .env en producción)
      DB_SERVER: ${DB_SERVER:-azcasqlserver.database.windows.net}
      DB_NAME: ${DB_NAME:-azca_db}
      DB_USER: ${DB_USER:-azca}
      DB_PASS: ${DB_PASS:-}  # Debe estar en .env local
      DB_DRIVER: "ODBC Driver 17 for SQL Server"
      
      # Configuración de la aplicación
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Volúmenes (útil para desarrollo local)
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/frontend/dist
    
    restart: unless-stopped
    networks:
      - azca-network
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # NGINX (Reverse proxy - Opcional para producción)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: azca-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro  # Para HTTPS (opcional)
    depends_on:
      - azca-api
    networks:
      - azca-network
    restart: unless-stopped
    profiles:
      - production  # Solo si ejecutas: docker-compose --profile production up

networks:
  azca-network:
    driver: bridge

# ============================================================================
# Ejemplo de uso:
#
# 1. Build imagen local:
#    docker-compose build
#
# 2. Ejecutar en desarrollo (con reload automático):
#    docker-compose up -d
#
# 3. Ver logs:
#    docker-compose logs -f azca-api
#
# 4. Detener:
#    docker-compose down
#
# 5. Con NGINX en producción:
#    docker-compose --profile production up -d
#
# 6. Ejecutar comandos dentro del contenedor:
#    docker-compose exec azca-api python -m pytest backend/tests/
# ============================================================================
